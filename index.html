        /* ===== SPLASH / LOADING SCREEN ===== */
        #splash {

            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);

            visibility: hidden;
            pointer-events: none;
        }

            position: relative;
            width: 80px;
            height: 80px;
        }
        #splash .loader-ring .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-radius: 50%;
            animation: spinRing 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;

        #splash .loader-ring .ring:nth-child(1) {
            border-top-color: #ff4fd8;
            animation-delay: 0s;
        }
        #splash .loader-ring .ring:nth-child(2) {
            border-right-color: #ff9ff0;
            animation-delay: 0.4s;
        }
        #splash .loader-ring .ring:nth-child(3) {
            border-bottom-color: #a78bfa;
            animation-delay: 0.8s;
        }
        #splash .loader-ring .ring:nth-child(4) {
            border-left-color: #7c3aed;
            animation-delay: 1.2s;
        }

        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }
            100% {

            }

    <script>
        // ============================================================
        //  SPLASH SCREEN
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                document.getElementById('splash').classList.add('hidden');
                // Setelah splash hilang, load home dan play musik
                loadPage('home');
                // Play musik setelah splash hilang
                setTimeout(function() {
                    const music = document.getElementById('bgMusic');
                    if (music && music.paused) {
                        music.play().catch(function(e) {
                            console.log('Auto-play prevented, user must interact');
                        });
                    }
                }, 400);
            }, 5000);
        });

        // ============================================================
        //  VARIABEL GLOBAL
        // ============================================================
        let botToken = "";
        let musicInitialized = false;

        // ============================================================
        //  MUSIC PLAYER - GLOBAL STATE
        // ============================================================
        let music = document.getElementById('bgMusic');
        let isPlaying = false;
        let currentTrack = 0;
        const playlist = [
            "https://files.catbox.moe/3255eb.mp3",
            "https://files.catbox.moe/smo6xi.mp3",
            "https://files.catbox.moe/ahquo2.mp3"
        ];

        function formatTime(sec) {
            const m = Math.floor(sec / 60) || 0;
            const s = Math.floor(sec % 60) || 0;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function loadTrack(index) {
            music.src = playlist[index];
            music.load();
            music.play().catch(function(e) {
                console.log('Auto-play prevented');
            });
        }

        // --- INIT MUSIC SYSTEM (ONCE) ---
        function initMusicSystem() {
            if (musicInitialized) return;
            musicInitialized = true;

            // Load first track
            loadTrack(0);

            // --- LANGSUNG KE LAGU BERIKUTNYA SAAT SELESAI ---
            music.addEventListener('ended', function() {
                currentTrack = (currentTrack + 1) % playlist.length;
                loadTrack(currentTrack);
            });

            // Update play/pause state
            music.addEventListener('play', function() {
                isPlaying = true;
                updateMusicUI();
            });

            music.addEventListener('pause', function() {
                isPlaying = false;
                updateMusicUI();
            });

            // Update progress bar & time display (global event)
            music.addEventListener('timeupdate', function() {
                const progressBar = document.getElementById('progressBar');
                const timeDisplay = document.getElementById('timeDisplay');
                if (progressBar) {
                    const p = (music.currentTime / music.duration) * 100 || 0;
                    progressBar.style.width = p + '%';
                }
                if (timeDisplay) {
                    timeDisplay.textContent = `${formatTime(music.currentTime)} / ${formatTime(music.duration)}`;
                }
            });

            // Click handler untuk progress container (di-attach di setupMusicUI)
        }

        // --- UPDATE MUSIC UI (dipanggil setiap home di-render) ---
        function updateMusicUI() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            const equalizer = document.getElementById('equalizer');
            const progressBar = document.getElementById('progressBar');
            const timeDisplay = document.getElementById('timeDisplay');

            if (playPauseBtn) {
                playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            }
            if (equalizer) {
                if (isPlaying) {
                    equalizer.classList.remove('paused');
                } else {
                    equalizer.classList.add('paused');
                }
            }
            if (progressBar) {
                const p = (music.currentTime / music.duration) * 100 || 0;
                progressBar.style.width = p + '%';
            }
            if (timeDisplay) {
                timeDisplay.textContent = `${formatTime(music.currentTime)} / ${formatTime(music.duration)}`;
            }
        }

        // --- SETUP MUSIC UI CONTROLS (dipanggil setiap home di-render) ---
        function setupMusicUI() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressContainer = document.getElementById('progressContainer');

            // Pastikan musik sudah di-init
            if (!musicInitialized) {
                initMusicSystem();
            }

            // Update UI state
            updateMusicUI();

            // Play/Pause
            if (playPauseBtn) {
                // Hapus listener lama dengan clone
                const newBtn = playPauseBtn.cloneNode(true);
                playPauseBtn.parentNode.replaceChild(newBtn, playPauseBtn);
                newBtn.addEventListener('click', function() {
                    if (isPlaying) {
                        music.pause();
                    } else {
                        music.play().catch(function(e) {});
                    }
                });
            }

            // Next
            if (nextBtn) {
                const newNext = nextBtn.cloneNode(true);
                nextBtn.parentNode.replaceChild(newNext, nextBtn);
                newNext.addEventListener('click', function() {
                    currentTrack = (currentTrack + 1) % playlist.length;
                    loadTrack(currentTrack);
                });
            }

            // Prev
            if (prevBtn) {
                const newPrev = prevBtn.cloneNode(true);
                prevBtn.parentNode.replaceChild(newPrev, prevBtn);
                newPrev.addEventListener('click', function() {
                    currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
                    loadTrack(currentTrack);
                });
            }

            // Progress container click
            if (progressContainer) {
                const newProgress = progressContainer.cloneNode(true);
                progressContainer.parentNode.replaceChild(newProgress, progressContainer);
                newProgress.addEventListener('click', function(e) {
                    const rect = newProgress.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const newTime = (clickX / rect.width) * music.duration;
                    music.currentTime = newTime;
                });
            }

            // Update progress bar periodically (fallback)
            if (!music._uiInterval) {
                music._uiInterval = setInterval(function() {
                    const progressBar = document.getElementById('progressBar');
                    const timeDisplay = document.getElementById('timeDisplay');
                    if (progressBar && music.duration) {
                        const p = (music.currentTime / music.duration) * 100 || 0;
                        progressBar.style.width = p + '%';
                    }
                    if (timeDisplay && music.duration) {
                        timeDisplay.textContent = `${formatTime(music.currentTime)} / ${formatTime(music.duration)}`;
                    }
                }, 500);
            }
        }

        function formatPhoneNumber(phone, format) {
            let cleaned = phone.replace(/\D/g, '');
            if (format === '62' && cleaned.startsWith('0')) cleaned = cleaned.substring(1);
            if (format === '62' && !cleaned.startsWith('62')) {
                if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
                cleaned = '62' + cleaned;
            }
            if (format === '08' && cleaned.startsWith('62')) cleaned = '0' + cleaned.substring(2);
            return cleaned;
        }

        async function spamOTP(serviceId, phone) {
            const delay = 500 + Math.random() * 1500;
            await new Promise(r => setTimeout(r, delay));
            const success = Math.random() < 0.7;
            return { service: serviceId, success, message: success ? 'OTP Terkirim' : 'Gagal Kirim' };
        }

        function getServiceName(id) {
            const s = OTP_SERVICES.find(s => s.id === id);
            return s ? s.name : id;
        }

        function getServiceFormat(id) {
            const s = OTP_SERVICES.find(s => s.id === id);
            return s ? s.format : '08';
        }

        async function startOTPSpam() {
            if (isOTPRunning) {
                Swal.fire({ icon: 'warning', title: 'Sedang Berjalan', text: 'Proses spam OTP sedang berjalan.' });
                return;
            }
            const phone = document.getElementById('otpPhone').value.trim();
            if (!phone) {
                Swal.fire({ icon: 'warning', title: 'Nomor Kosong', text: 'Masukkan nomor target!' });
                return;
            }
            if (otpSelectedTargets.size === 0) {
                Swal.fire({ icon: 'warning', title: 'Tidak Ada Layanan', text: 'Pilih minimal 1 layanan!' });
                return;
            }

            const confirm = await Swal.fire({
                title: '⚠️ PERINGATAN!',
                html: `Spam OTP ke: <b>${phone}</b><br>Layanan: ${otpSelectedTargets.size}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'Ya, SPAM!',
                cancelButtonText: 'Batal'
            });
            if (!confirm.isConfirmed) return;

            isOTPRunning = true;
            const btn = document.querySelector('#otpResultContainer')?.closest('.page-box')?.querySelector('.btn-danger');
            const progress = document.getElementById('otpProgress');
            const resultList = document.getElementById('otpResultList');
            const container = document.getElementById('otpResultContainer');

            if (btn) btn.disabled = true;
            if (container) container.style.display = 'block';
            if (progress) progress.style.width = '0%';
            if (resultList) resultList.innerHTML = '';

            let successCount = 0,
                failedCount = 0;
            const targets = Array.from(otpSelectedTargets);
            const total = targets.length;
            const parallel = document.getElementById('otpParallel').checked;

            targets.forEach(id => {
                const st = document.getElementById(`otp_status_${id}`);
                if (st) { st.textContent = '⏳';
                    st.className = 'target-status pending'; }
            });

            try {
                if (parallel) {
                    const promises = targets.map(async (id) => {
                        const format = getServiceFormat(id);
                        const formatted = formatPhoneNumber(phone, format);
                        const result = await spamOTP(id, formatted);
                        return { id, result };
                    });
                    const results = await Promise.all(promises);
                    results.forEach(({ id, result }) => {
                        updateOTPResult(id, result);
                        if (result.success) successCount++;
                        else failedCount++;
                        const pct = ((successCount + failedCount) / total) * 100;
                        if (progress) progress.style.width = pct + '%';
                    });
                } else {
                    for (let i = 0; i < targets.length; i++) {
                        const id = targets[i];
                        const format = getServiceFormat(id);
                        const formatted = formatPhoneNumber(phone, format);
                        const result = await spamOTP(id, formatted);
                        updateOTPResult(id, result);
                        if (result.success) successCount++;
                        else failedCount++;
                        const pct = ((i + 1) / total) * 100;
                        if (progress) progress.style.width = pct + '%';
                    }
                }

                document.getElementById('otpSuccess').textContent = successCount;
                document.getElementById('otpFailed').textContent = failedCount;

                Swal.fire({
                    icon: successCount > failedCount ? 'success' : 'warning',
                    title: '✅ Spam Selesai!',
                    text: `Berhasil: ${successCount} | Gagal: ${failedCount}`
                });
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message });
            } finally {
                isOTPRunning = false;
                if (btn) btn.disabled = false;
                if (progress) progress.style.width = '100%';
            }
        }

        function updateOTPResult(id, result) {
            const st = document.getElementById(`otp_status_${id}`);
            if (st) {
                st.textContent = result.success ? '✅' : '❌';
                st.className = 'target-status ' + (result.success ? 'success' : 'failed');
            }
            const list = document.getElementById('otpResultList');
            if (!list) return;
            const item = document.createElement('div');
            item.className = 'otp-result-item';
            const name = getServiceName(id);
            item.innerHTML = `
                <span class="result-name">${name}</span>
                <span class="result-status ${result.success ? 'success' : 'failed'}">
                    ${result.success ? '✅ Berhasil' : '❌ Gagal'}
                    <span style="font-size:0.65rem;color:#b0b8c8;margin-left:4px;">${result.message}</span>
                </span>
            `;
            list.appendChild(item);
        }

        function copyJWT() {
            if (generatedJWT) {
                copyText(generatedJWT);
            } else {
                Swal.fire({ icon: 'warning', title: 'Tidak Ada Token', text: 'Generate token terlebih dahulu!' });
            }
        }

        function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    Swal.fire({ icon: 'success', title: 'Tersalin!', timer: 1500, showConfirmButton: false });
                }).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            Swal.fire({ icon: 'success', title: 'Tersalin!', timer: 1500, showConfirmButton: false });
        }

        async function fetchUpdateBio() {
            const bio = document.getElementById('bioText').value.trim();
            const color = document.getElementById('bioColor').value;
            const status = document.getElementById('bioStatus');
            const result = document.getElementById('bioResult');

            if (!bio) {
                Swal.fire({ icon: 'warning', title: 'Bio Kosong', text: 'Masukkan teks bio!' });
                return;
            }
            if (bio.length > 300) {
                Swal.fire({ icon: 'warning', title: 'Terlalu Panjang', text: 'Bio max 300 karakter!' });
                return;
            }

            let apiUrl = `https://long-bio-cgu.vercel.app/bio_upload?bio=${encodeURIComponent(bio)}`;
            let method = '';
            if (currentBioMethod === 'jwt') {
                const jwt = document.getElementById('bioJwt').value.trim();
                if (!jwt) { Swal.fire({ icon: 'warning', title: 'JWT Kosong', text: 'Masukkan JWT token!' }); return; }
                apiUrl += `&jwt=${encodeURIComponent(jwt)}`;
                method = 'Direct JWT';
            } else {
                const uid = document.getElementById('bioUid').value.trim();
                const pass = document.getElementById('bioPass').value.trim();
                if (!uid || !pass) { Swal.fire({ icon: 'warning', title: 'Data Kosong', text: 'Isi UID dan password!' }); return; }
                apiUrl += `&uid=${encodeURIComponent(uid)}&pass=${encodeURIComponent(pass)}`;
                method = 'UID + Password';
            }

            const confirm = await Swal.fire({
                title: 'Konfirmasi Update Bio',
                html: `Bio: ${bio}<br>Warna: <span style="color:${color};">${color}</span><br>Method: ${method}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#db2777',
                confirmButtonText: 'Ya, Update!',
                cancelButtonText: 'Batal'
            });
            if (!confirm.isConfirmed) return;

            status.textContent = '⏳ Mengupdate...';
            status.style.color = '#ff9ff0';

            try {
                const resp = await fetch(apiUrl);
                const data = await resp.json();

                const preview = document.getElementById('bioPreview');
                preview.innerHTML = `<span style="color:${color};">${bio}</span>`;
                preview.style.borderLeftColor = color;

                document.getElementById('bioRstatus').innerHTML = data.status ?
                    `<span style="color:#2ecc71;">✅ ${data.status}</span>` :
                    '<span style="color:#ff4757;">❌ Gagal</span>';

                document.getElementById('bioRuid').textContent = data.uid || '-';
                document.getElementById('bioRname').textContent = data.name || 'N/A';
                document.getElementById('bioRregion').textContent = data.region || 'N/A';
                document.getElementById('bioRopenid').textContent = data.open_id || '-';
                document.getElementById('bioRmsg').textContent = data.message || 'Tidak ada pesan';

                const genJwt = document.getElementById('bioRgenjwt');
                if (data.generated_jwt) {
                    genJwt.textContent = data.generated_jwt;
                } else {
                    genJwt.textContent = '-';
                }

                result.style.display = 'block';
                if (data.status && data.status.includes('Success')) {
                    status.textContent = '✅ Bio berhasil diupdate!';
                    status.style.color = '#2ecc71';
                    Swal.fire({ icon: 'success', title: '✅ Bio Diupdate!', html: `Bio: <span style="color:${color};">${bio}</span>` });
                } else {
                    status.textContent = '❌ Gagal update bio.';
                    status.style.color = '#ff4757';
                }
            } catch (err) {
                status.textContent = `❌ Error: ${err.message}`;
                status.style.color = '#ff4757';
            }
        }

        // --- OAUTH LOGIN ---
        function openOAuth(provider, url) {
            const status = document.getElementById('oauthStatus');
            status.textContent = `⏳ Membuka ${provider}...`;
            status.style.color = '#ff9ff0';

            const w = 600,
                h = 700;
            const left = (window.innerWidth - w) / 2;
            const top = (window.innerHeight - h) / 2;
            const win = window.open(url, 'OAuth Login', `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=yes`);

            if (win) {
                Swal.fire({ icon: 'info', title: `🔄 ${provider}`, text: 'Login di jendela yang terbuka.' });
            } else {
                Swal.fire({ icon: 'error', title: 'Pop-up Terblokir!', text: 'Izinkan pop-up untuk situs ini.' });
            }
            status.textContent = `✅ ${provider} dibuka.`;
            status.style.color = '#2ecc71';
        }
